server.port=${PORT:8080}
spring.application.name=portfolio-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio
spring.datasource.username=postgres
spring.datasource.password=Shiva@123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=false

# Gemini Configuration
gemini.api.key=${GEMINI_API_KEY:PLACEHOLDER}
gemini.url.template=${GEMINI_URL_TEMPLATE:https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=%s}